<!DOCTYPE html>
<html>
<head>
  <title>Jobs Portal</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f3f2ef;
    }

    h1 {
      text-align: center;
    }

    #search {
      display: block;
      margin: 10px auto;
      padding: 8px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .company {
      color: gray;
      font-size: 14px;
    }

    .desc {
      font-size: 13px;
      margin: 10px 0;
    }

    .apply {
      display: inline-block;
      background: #0a66c2;
      color: white;
      padding: 8px 12px;
      border-radius: 5px;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <h1>💼 Latest Jobs</h1>

  <input type="text" id="search" placeholder="Search jobs..." />

  <div id="jobsContainer" class="grid"></div>

  <script>
    const container = document.getElementById("jobsContainer");
    const searchInput = document.getElementById("search");

    let allJobs = [];

    fetch("/api/jobs")
      .then(res => res.json())
      .then(data => {
        allJobs = data;
        displayJobs(allJobs.slice(0, 12));
      });

    function displayJobs(jobs) {
      container.innerHTML = "";

      jobs.forEach(job => {
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <h2>${job.title}</h2>
          <p class="company">${job.company_name}</p>
          <p>📍 ${job.candidate_required_location}</p>

          <p class="desc">
            ${stripHTML(job.description).slice(0, 120)}...
          </p>

          <p><b>${job.salary || "Not disclosed"}</b></p>

          <a href="${job.url}" target="_blank" class="apply">
            Apply Now →
          </a>
        `;

        container.appendChild(div);
      });
    }

    searchInput.addEventListener("input", () => {
      const value = searchInput.value.toLowerCase();

      const filtered = allJobs.filter(job =>
        job.title.toLowerCase().includes(value) ||
        job.company_name.toLowerCase().includes(value)
      );

      displayJobs(filtered.slice(0, 12));
    });

    function stripHTML(html) {
      const div = document.createElement("div");
      div.innerHTML = html;
      return div.textContent || div.innerText || "";
    }
  </script>

</body>
</html>
