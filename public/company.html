


<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartPlace | Company Data</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f8fafc;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
}

/* Grid */
.company-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* Card */
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.logo {
  width: 60px;
  height: 60px;
  background: #eef2ff;
  border-radius: 50%;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  color: #3b82f6;
}

.cgpa {
  background: #dcfce7;
  padding: 5px 10px;
  border-radius: 20px;
  display: inline-block;
  margin-top: 10px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 10px;
  width: 90%;
  max-width: 600px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}

.apply-btn {
  display: block;
  margin-top: 20px;
  padding: 10px;
  text-align: center;
  background: #3b82f6;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}
</style>

</head>

<body>

<div class="container">
  <h1>Target Companies</h1>
  <div class="company-grid" id="grid"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <div id="modalData"></div>
  </div>
</div>

<script>

let companies = [];

const grid = document.getElementById("grid");
const modal = document.getElementById("modal");
const modalData = document.getElementById("modalData");

// 🔥 Load from backend
async function loadCompanies() {
  try {
    grid.innerHTML = "<h3>Loading...</h3>";

    const res = await fetch("http://localhost:5000/api/companies");

    if (!res.ok) throw new Error("API error");

    companies = await res.json();

    if (!companies.length) {
      grid.innerHTML = "<h3>No companies found</h3>";
      return;
    }

    renderCards();

  } catch (err) {
    grid.innerHTML = "<h3 style='color:red'>⚠ Backend not running or error</h3>";
    console.error(err);
  }
}

// 🔥 Render cards
function renderCards() {
  grid.innerHTML = "";

  companies.forEach((c, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => showDetails(i);

    card.innerHTML = `
      <div class="logo">${c.name ? c.name[0] : "?"}</div>
      <h3>${c.name || "No Name"}</h3>
      <p>${c.summary || "No summary available"}</p>
      <div class="cgpa">CGPA: ${c.cgpa || "N/A"}</div>
    `;

    grid.appendChild(card);
  });
}

// 🔥 Show modal (SAFE VERSION)
function showDetails(i) {
  const c = companies[i];

  modalData.innerHTML = `
    <h2>${c.name || ""}</h2>
    <p>${c.description || "No description available"}</p>

    <p><b>📍 Location:</b> ${c.location || "N/A"}</p>
    <p><b>💰 Package:</b> ${c.package || "N/A"}</p>
    <p><b>🎓 CGPA:</b> ${c.cgpa || "N/A"}</p>
    <p><b>⚡ Difficulty:</b> ${c.difficulty || "N/A"}</p>

    <p><b>💼 Roles:</b> ${(c.roles || []).join(", ")}</p>
    <p><b>🧠 Skills:</b> ${(c.skills || []).join(", ")}</p>
    <p><b>🧪 Rounds:</b> ${(c.rounds || []).join(", ")}</p>

    <p><b>📌 Eligibility:</b> ${c.eligibility || "N/A"}</p>

    ${c.apply ? `
      <a href="${c.apply}" target="_blank" class="apply-btn">Apply Now 🚀</a>
    ` : ""}
  `;

  modal.style.display = "flex";
}

// Close modal
function closeModal() {
  modal.style.display = "none";
}

// Close on outside click
window.onclick = (e) => {
  if (e.target == modal) closeModal();
};

// 🚀 Start
loadCompanies();

</script>



</body>
</html>
