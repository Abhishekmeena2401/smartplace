<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub | Smart Placement</title>
    <style>
        /* Global Reset & Theme */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #156abe;
            --primary-hover: #0e5499;
            --bg-white: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #f1f5f9;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --card-shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-white);
            color: var(--text-main);
            padding-top: 80px;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Navigation / Brand Name */
        .nav-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 0 40px;
            height: 70px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
        }

        .brand {
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #1a1a1a;
            text-transform: uppercase;
        }

        .brand span {
            background: linear-gradient(135deg, #156abe, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Section */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        /* Responsive Grid */
        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }

        /* Card Design */
        .course-card {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .course-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--primary);
        }

        .badge {
            align-self: flex-start;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            background: #eff6ff;
            color: var(--primary);
            border: 1px solid #dbeafe;
        }

        .course-title {
            font-size: 1.35rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 12px;
            color: #0f172a;
            min-height: 3.6em; /* Balanced height */
        }

        .platform {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .platform::before {
            content: "🌐";
            font-size: 1rem;
        }

        /* Price & Footer */
        .price-container {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid #f8fafc;
        }

        .price-tag {
            font-size: 1.4rem;
            font-weight: 900;
            color: #0f172a;
        }

        .enroll-btn {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(21, 106, 190, 0.2);
        }

        .enroll-btn:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 10px 15px -3px rgba(21, 106, 190, 0.3);
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .nav-header { padding: 0 20px; }
            h1 { font-size: 2.2rem; }
            .course-grid { padding: 20px; }
        }
    </style>
</head>
<body>

    <header class="nav-header">
        <div class="brand">Smart<span>Placement</span></div>
    </header>

    <div class="header">
        <h1>Learning Hub</h1>
        <p class="subtitle">Master the most in-demand tech skills with courses from top platforms like Udemy, Coursera, and YouTube.</p>
    </div>

    <div class="course-grid" id="course-container">
        </div>

<script>
    const container = document.getElementById('course-container');

    // --- MOCK DATA FOR INSTANT PREVIEW ---
 
 
    let courses = [];

    // 🔥 Load Courses
    async function loadCourses() {
  try {
    const res = await fetch("/api/courses");

    if (!res.ok) {
      throw new Error("API failed");
    }

    const data = await res.json();

    console.log("API DATA:", data); // 🔥 debug

    if (!data || data.length === 0) {
      container.innerHTML = "<p>No courses found</p>";
      return;
    }

    courses = data;
    renderCourses();

  } catch (err) {
    console.error(err);
    container.innerHTML = "<p>Failed to load courses</p>";
  }
}
    // 🔥 Render cards
    function renderCourses() {
        container.innerHTML = "";

        courses.forEach(course => {
            const card = document.createElement('div');
            card.className = 'course-card';

            card.innerHTML = `
                <span class="badge">${course.skill || "Skill"}</span>
                <h3 class="course-title">${course.title || "No Title"}</h3>
                <div class="platform">Source: ${course.platform || "Unknown"}</div>
                <div class="price-container">
                    <span class="price-tag">${course.price || "Free"}</span>
                    <a href="${course.link && course.link.startsWith('http') ? course.link : '#'}"
                       target="_blank" 
                       class="enroll-btn">
                       Explore Now
                    </a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    loadCourses();
</script>

</body>
</html>
