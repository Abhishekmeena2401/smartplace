<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartPlace Quiz</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #f0f4f8;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Heading */
h2 {
  text-align: center;
  margin-bottom: 20px;
}

/* Skills Grid */
.skills {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.skill-btn {
  padding: 15px;
  border: none;
  background: #007bff;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}

.skill-btn:hover {
  background: #0056b3;
  transform: scale(1.05);
}

/* Questions */
.question {
  margin: 20px 0;
  padding: 15px;
  background: #f9fafc;
  border-radius: 8px;
}

.question p {
  font-weight: 600;
}

/* Options */
.option {
  display: block;
  margin: 8px 0;
  padding: 10px;
  background: #eef2f7;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
}

.option:hover {
  background: #dbeafe;
}

/* Submit Button */
.submit-btn {
  margin-top: 20px;
  padding: 12px;
  width: 100%;
  background: #28a745;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.submit-btn:hover {
  background: #218838;
}

/* Result */
.result-box {
  margin-bottom: 20px;
  padding: 15px;
  border-radius: 8px;
  background: #f8fafc;
}

.correct {
  color: green;
}

.wrong {
  color: red;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<div class="container">

  <!-- Skills -->

  <div id="skillSection">
    <h2>Select Skill</h2>
    <div class="skills">
      <button class="skill-btn" onclick="loadQuiz('python')">Python</button>
      <button class="skill-btn" onclick="loadQuiz('java')">Java</button>
      <button class="skill-btn" onclick="loadQuiz('cpp')">C++</button>
      <button class="skill-btn" onclick="loadQuiz('javascript')">JavaScript</button>
      <button class="skill-btn" onclick="loadQuiz('html')">HTML</button>
      <button class="skill-btn" onclick="loadQuiz('css')">CSS</button>
    </div>
  </div>

  <!-- Quiz -->

  <div id="quizSection" class="hidden">
    <h2 id="title"></h2>
    <form id="quizForm"></form>
    <button type="button" class="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
  </div>

  <!-- Result -->

  <div id="resultSection" class="hidden"></div>

</div>

<script>

let currentQuestions = [];

// Load Quiz
async function loadQuiz(skill) {
  try {
    const res = await fetch(`http://localhost:5000/api/questions/${skill}`);
    currentQuestions = await res.json();

    document.getElementById("skillSection").classList.add("hidden");
    document.getElementById("quizSection").classList.remove("hidden");

    document.getElementById("title").innerText = skill.toUpperCase() + " Quiz";

    let html = "";

    currentQuestions.forEach((q, i) => {
      html += `
        <div class="question">
          <p>Q${i + 1}. ${q.question}</p>
          ${q.options.map(opt => `
            <label class="option">
              <input type="radio" name="q${i}" value="${opt}">
              ${opt}
            </label>
          `).join("")}
        </div>
      `;
    });

    document.getElementById("quizForm").innerHTML = html;

  } catch (err) {
    alert("Backend not running or no data!");
  }
}

// Submit Quiz
function submitQuiz() {
  let score = 0;
  let resultHTML = "";

  currentQuestions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const userAnswer = selected ? selected.value : "Not Attempted";
    const correct = q.answer;

    let statusClass = userAnswer === correct ? "correct" : "wrong";
    if (userAnswer === correct) score++;

    resultHTML += `
      <div class="result-box">
        <p><b>Q${i + 1}:</b> ${q.question}</p>
        <p>Your Answer: <span class="${statusClass}">${userAnswer}</span></p>
        <p>Correct Answer: <span class="correct">${correct}</span></p>
      </div>
    `;
  });

  resultHTML += `<h2>Your Score: ${score} / ${currentQuestions.length}</h2>`;
  resultHTML += `<button class="submit-btn" onclick="location.reload()">Try Again</button>`;

  document.getElementById("quizSection").classList.add("hidden");
  document.getElementById("resultSection").classList.remove("hidden");

  document.getElementById("resultSection").innerHTML = resultHTML;
}

</script>

</body>
</html>
